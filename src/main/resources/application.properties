spring.application.name=studyplangym

spring.datasource.url=jdbc:mysql://localhost:3306/study_plan_gym?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Mmcp1934}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.sql.init.mode=never

server.error.whitelabel.enabled=false
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

server.port=${PORT:8080}